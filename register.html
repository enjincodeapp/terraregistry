<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account — Terra Registry</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
<style>
:root { --bg: #111508; --surface: #1a1d10; --surface-card: rgba(18,18,18,0.6); --text: #e2e4cf; --text-secondary: #c4c9ac; --text-muted: #8e9379; --border: rgba(255,255,255,0.08); --border-variant: #444933; --accent: #c3f400; --accent-text: #283500; --card-border: rgba(255,255,255,0.08); --glow: rgba(255,255,255,0.1); --section-alt: #0c0f04; --bg-low: #1a1d10; }
[data-theme="light"] { --bg: #f5f5f0; --surface: #ffffff; --surface-card: rgba(255,255,255,0.7); --text: #1a1a1a; --text-secondary: #555555; --text-muted: #888; --border: rgba(0,0,0,0.08); --border-variant: #ccc; --accent: #CCFF00; --accent-text: #1a1a1a; --card-border: rgba(0,0,0,0.08); --glow: rgba(255,255,255,0.5); --section-alt: #ffffff; --bg-low: #e8e8e3; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); transition: background .3s, color .3s; min-height:100vh; display:flex; flex-direction:column; }
h1, h2, h3, h4, h5, h6 { font-family: 'Hanken Grotesk', sans-serif; }
label, .label, .badge, .tag { font-family: 'Geist', sans-serif; }
.glass-card { background: var(--surface-card); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--card-border); transition: background .3s, border .3s; }
.inner-glow { box-shadow: inset 0 1px 1px var(--glow); }
html { scroll-behavior: smooth; }
</style>
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: { heading: ['"Hanken Grotesk"', 'sans-serif'], body: ['Inter', 'sans-serif'], label: ['Geist', 'sans-serif'] }
    }
  }
}
</script>
</head>
<body>
<nav class="fixed top-0 left-0 right-0 z-50 glass-card border-b" style="border-color:var(--border);height:64px;">
  <div class="max-w-7xl mx-auto px-6 h-full flex items-center justify-between">
    <a href="index.html" class="flex items-center gap-2">
      <span class="w-7 h-7 rounded-lg flex items-center justify-center" style="background:var(--accent);">
        <span class="material-symbols-outlined text-lg" style="color:var(--accent-text);font-variation-settings:'FILL' 1">terrain</span>
      </span>
      <span class="font-heading font-bold text-lg" style="color:var(--text);">Terra<span style="color:var(--accent);">Registry</span></span>
    </a>
    <div class="hidden md:flex items-center gap-8">
      <a href="marketplace.html" class="label text-sm" style="color:var(--text-secondary);">Marketplace</a>
      <a href="dashboard.html" class="label text-sm" style="color:var(--text-secondary);">Analytics</a>
      <a href="infrastructure.html" class="label text-sm" style="color:var(--text-secondary);">Infrastructure</a>
      <a href="governance.html" class="label text-sm" style="color:var(--text-secondary);">Governance</a>
    </div>
    <div class="flex items-center gap-3">
      <button onclick="toggleTheme()" class="w-9 h-9 rounded-lg flex items-center justify-center" style="background:var(--bg-low);border:1px solid var(--border-variant);" title="Toggle theme">
        <span class="material-symbols-outlined text-sm" style="color:var(--text-secondary);" id="themeIcon">dark_mode</span>
      </button>
      <a href="login.html" class="label text-xs px-4 py-2 rounded-lg" style="color:var(--text-secondary);border:1px solid var(--border-variant);">Sign In</a>
    </div>
  </div>
</nav>

<main class="flex-1 flex items-center justify-center px-6" style="padding-top:64px;">
  <div class="w-full max-w-md">
    <div class="glass-card rounded-2xl p-8 md:p-10 inner-glow">
      <div class="text-center mb-8">
        <span class="w-12 h-12 rounded-xl flex items-center justify-center mx-auto mb-4" style="background:var(--accent);">
          <span class="material-symbols-outlined text-2xl" style="color:var(--accent-text);font-variation-settings:'FILL' 1">terrain</span>
        </span>
        <h1 class="font-heading text-2xl font-bold" style="color:var(--text);">Create Account</h1>
        <p class="label text-sm mt-1" style="color:var(--text-muted);">Join Nigeria's property intelligence platform</p>
      </div>
      <form onsubmit="return false;">
        <div class="space-y-5">
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="label text-sm font-medium mb-1.5 block" style="color:var(--text);">First Name</label>
              <input type="text" placeholder="John" class="w-full rounded-xl py-3 px-4 label text-sm focus:outline-none transition-colors" style="background:var(--bg-low);border:1px solid var(--border-variant);color:var(--text);">
            </div>
            <div>
              <label class="label text-sm font-medium mb-1.5 block" style="color:var(--text);">Last Name</label>
              <input type="text" placeholder="Doe" class="w-full rounded-xl py-3 px-4 label text-sm focus:outline-none transition-colors" style="background:var(--bg-low);border:1px solid var(--border-variant);color:var(--text);">
            </div>
          </div>
          <div>
            <label class="label text-sm font-medium mb-1.5 block" style="color:var(--text);">Email Address</label>
            <input type="email" placeholder="you@example.com" class="w-full rounded-xl py-3 px-4 label text-sm focus:outline-none transition-colors" style="background:var(--bg-low);border:1px solid var(--border-variant);color:var(--text);">
          </div>
          <div>
            <label class="label text-sm font-medium mb-1.5 block" style="color:var(--text);">Phone Number</label>
            <input type="tel" placeholder="+234 800 000 0000" class="w-full rounded-xl py-3 px-4 label text-sm focus:outline-none transition-colors" style="background:var(--bg-low);border:1px solid var(--border-variant);color:var(--text);">
          </div>
          <div>
            <label class="label text-sm font-medium mb-1.5 block" style="color:var(--text);">Password</label>
            <input type="password" placeholder="Create a strong password" class="w-full rounded-xl py-3 px-4 label text-sm focus:outline-none transition-colors" style="background:var(--bg-low);border:1px solid var(--border-variant);color:var(--text);">
          </div>
          <div>
            <label class="label text-sm font-medium mb-1.5 block" style="color:var(--text);">Confirm Password</label>
            <input type="password" placeholder="Confirm your password" class="w-full rounded-xl py-3 px-4 label text-sm focus:outline-none transition-colors" style="background:var(--bg-low);border:1px solid var(--border-variant);color:var(--text);">
          </div>
          <label class="flex items-start gap-2 cursor-pointer">
            <input type="checkbox" class="mt-0.5 rounded" style="accent-color:var(--accent);">
            <span class="label text-xs leading-relaxed" style="color:var(--text-secondary);">I agree to the <a href="#" style="color:var(--accent);">Terms of Service</a> and <a href="#" style="color:var(--accent);">Privacy Policy</a></span>
          </label>
          <button class="w-full label text-sm rounded-xl py-3 font-semibold transition-all" style="background:var(--accent);color:var(--accent-text);">Create Account</button>
        </div>
      </form>
      <div class="mt-6 text-center">
        <p class="label text-xs" style="color:var(--text-muted);">Already have an account? <a href="login.html" class="font-semibold" style="color:var(--accent);">Sign in</a></p>
      </div>
    </div>
    <p class="text-center mt-6 label text-xs" style="color:var(--text-muted);">&copy; 2026 Terra Registry. All rights reserved.</p>
  </div>
</main>

<script>
function toggleTheme() {
  const html = document.documentElement;
  const current = html.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  document.getElementById('themeIcon').textContent = next === 'dark' ? 'dark_mode' : 'light_mode';
}
(function() {
  const saved = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('themeIcon').textContent = saved === 'dark' ? 'dark_mode' : 'light_mode';
  });
})();
</script>
</body>
</html>
